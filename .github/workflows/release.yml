name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-static:
    name: Build Linux static executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack static Linux executable
        run: >
          docker run --rm
          -v "$GITHUB_WORKSPACE:/work"
          -w /work
          python:3.11-bullseye
          bash -lc "apt-get update &&
          apt-get install -y --no-install-recommends patchelf file &&
          bash tools/pack.sh src"

      - name: Fix artifact ownership
        run: sudo chown -R "$(id -u):$(id -g)" dist

      - name: Run frozen example
        run: tools/run_frozen_example.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-servant-linux
          path: |
            dist/ai-servant
            dist/ai-servant-*-linux.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pack on Windows
        id: pack
        shell: cmd
        run: call tools\ci_pack_windows.bat
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: Run frozen example
        shell: cmd
        run: call tools\run_frozen_example.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-servant-windows
          path: |
            dist/ai-servant.exe
            dist/ai-servant-*-windows.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux-static, build-windows]
    if: always() && needs.build-linux-static.result == 'success' && needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          version = re.search(r'(?m)^version\s*=\s*"([^"]+)"', text).group(1)
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-flat
          find release-assets -maxdepth 3 -type f -print -exec cp {} release-flat/ \;
          ls -la release-flat

      - name: Move rolling tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ai-servant ${{ steps.version.outputs.tag }}
          files: release-flat/*
          fail_on_unmatched_files: true
          generate_release_notes: false
